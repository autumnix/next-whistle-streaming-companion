server:
  host: "0.0.0.0"
  port: 8787
  log_level: "info"  # debug | info | warning | error

database:
  path: "nwsc.sqlite3"

recordings:
  base_path: ~/streaming/recordings
  replay_dir_override: null  # Set to explicit path to skip auto-detection
  extensions: [".mkv", ".mp4", ".mov"]
  file_stabilize_timeout_s: 6.0
  file_stabilize_poll_s: 0.25

obs:
  host: "127.0.0.1"
  port: 4455
  password: "7RLWyr28m8HgbBAn"
  timeout_s: 5
  scenes:
    cam1: "LIVE - CAM 1"
    cam2: "LIVE - CAM 2"
    replay: "REPLAY"
    safe: "BUMPER"
  media_input_name: "REPLAY_MEDIA"
  replay_length_s: 7.0
